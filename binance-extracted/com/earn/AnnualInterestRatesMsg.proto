syntax = "proto2";

package com.earn;

option optimize_for = SPEED;
option java_package = "com.binance.ws.messages.protobuf.com.earn";
option java_multiple_files = true;
option java_outer_classname = "AnnualInterestRatesMsgProto";

message AnnualInterestRatesMsg {
	repeated AnnualInterestRate annualInterestRate = 1;
	optional string dateTimestamp=2;

	message AnnualInterestRate {
		optional string coin = 1;
		optional string annualInterestRate = 2;
	}
}
